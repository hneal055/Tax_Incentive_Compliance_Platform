[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python -m prisma generate"

[build.environment]
PYTHON_VERSION = "3.12"

[deploy]
startCommand = "python -m prisma migrate resolve --rolled-back 20260411000002_phase0_stacking_engine || true && python -m prisma migrate deploy && uvicorn src.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
