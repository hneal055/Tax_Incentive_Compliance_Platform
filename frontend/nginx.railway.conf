server {
    listen 3000;  # replaced at startup by entrypoint.sh using $PORT
    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer sizes for JWT auth responses
    proxy_buffer_size          16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size    32k;

    # Proxy /api/ to Railway backend via private internal network (avoids CDN loop)
    location /api/ {
        proxy_pass http://taxincentivecomplianceplatform.railway.internal:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
