server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — required so nginx resolves 'backend' at request time, not startup
    resolver 127.0.0.11 valid=5s;

    # Proxy all /api/ requests to the backend — supports all HTTP methods (POST, GET, etc.)
    # Using a variable forces runtime DNS resolution (avoids "host not found" on startup).
    location /api/ {
        set $upstream http://pilotforge-api:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # SPA fallback — only applies to GET/HEAD, not API routes above
    location / {
        try_files $uri /index.html;
    }
}
