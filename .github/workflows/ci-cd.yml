name: PilotForge CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Job 1: Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pilotforge_user
          POSTGRES_PASSWORD: pilotforge_pass
          POSTGRES_DB: pilotforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: 🗄️ Set up database
        env:
          DATABASE_URL: postgresql://pilotforge_user:pilotforge_pass@localhost:5432/pilotforge_test
        run: |
          python -m prisma generate
          python -m prisma migrate deploy

      - name: 🧪 Run tests with coverage
        env:
          DATABASE_URL: postgresql://pilotforge_user:pilotforge_pass@localhost:5432/pilotforge_test
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: pilotforge-coverage

      - name: ✅ Test summary
        run: |
          echo "## 🎉 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "All tests passed successfully!" >> $GITHUB_STEP_SUMMARY

  # Job 2: Frontend – typecheck, lint, test, build
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: |
          cd frontend
          npm ci --prefer-offline || npm install

      - name: 🔍 Typecheck
        run: |
          cd frontend
          npm run type-check
        continue-on-error: true

      - name: 🧹 Lint
        run: |
          cd frontend
          npm run lint
        continue-on-error: true

      - name: 🧪 Run frontend tests
        run: |
          cd frontend
          npm run test:run

      - name: 🏗️ Build frontend
        run: |
          cd frontend
          npm run build

  # Job 3: Linting & Code Quality
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install linting tools
        run: |
          pip install flake8 black isort mypy

      - name: 🔍 Check code formatting (Black)
        run: black --check src/ tests/
        continue-on-error: true

      - name: 📐 Check import sorting (isort)
        run: isort --check-only src/ tests/
        continue-on-error: true

      - name: 🐛 Lint code (Flake8)
        run: flake8 src/ tests/ --max-line-length=120
        continue-on-error: true

  # Job 4: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: 📤 Upload security results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # Job 5: Build & Deploy to Render (on main branch)
  deploy:
    name: Deploy to Production
    needs: [test, frontend, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Render
        run: |
          echo "🎬 Deploying PilotForge to production..."
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}"

      - name: 🎉 Deployment summary
        run: |
          echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "PilotForge has been deployed to production" >> $GITHUB_STEP_SUMMARY
          echo "🌐 URL: https://pilotforge.onrender.com" >> $GITHUB_STEP_SUMMARY

  # Job 6: Create Release (on version tags)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📝 Generate release notes
        id: release_notes
        run: |
          echo "# PilotForge ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "## What's New" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 @^)..@ >> release_notes.md

      - name: 🎉 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: PilotForge ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
